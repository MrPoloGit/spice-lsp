name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-15
            asset: spice-lsp-darwin-aarch64.tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            asset: spice-lsp-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            asset: spice-lsp-linux-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset: spice-lsp-windows-x86_64.zip
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            asset: spice-lsp-windows-aarch64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf ${{ matrix.asset }} \
            -C target/${{ matrix.target }}/release \
            spice-lsp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/spice-lsp.exe `
            -DestinationPath ${{ matrix.asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
